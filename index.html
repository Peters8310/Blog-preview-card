<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Conexión con los servidores de Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Cargamos la fuente Figtree con los grosores 500 y 800 -->
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>  
  <!-- Este link enlaza a HTML con CSS -->
  <link rel="stylesheet" href="style.css">
  
</head>
<!-- aqui estan en clases la tarjeta, las imagenes , las descripciones que luego van a ser coloreadas y alinieadas en CSS  -->
<body>

  <main class="card-container">
    
    <article class="card">
      
      <img src="./assets/images/illustration-article.svg" alt="Ilustración abstracta de HTML y CSS" class="card-image">
      
      <div class="card-content">
        
        <span class="category-tag">Learning</span>
        
        <p class="publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
        
        <h1 class="card-title">
          <a href="#">HTML & CSS foundations</a>
        </h1>
        
        <p class="card-description">
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>
        
      </div>

      <footer class="card-author">
        <img src="./assets/images/image-avatar.webp" alt="Avatar de Greg Hooper" class="author-avatar">
        <span class="author-name">Greg Hooper</span>
      </footer>

    </article>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Peterson Chery</a>.
  </footer>

</body>
</html>
